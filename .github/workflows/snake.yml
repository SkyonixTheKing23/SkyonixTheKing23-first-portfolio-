name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: SkyonixTheKing23
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Copy SVG to main
        run: |
          cp dist/github-contribution-grid-snake.svg ./github-contribution-grid-snake.svg
          git config --global user.email "iamfrostytheking@gmail.com"
          git config --global user.name "Soulaiman"
          git add github-contribution-grid-snake.svg
          git commit -m "Update snake" || echo "Nothing to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
